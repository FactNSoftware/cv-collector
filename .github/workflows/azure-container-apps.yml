name: CI and Azure Container Apps

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub Environment name
        required: true
        default: prod
        type: choice
        options:
          - prod
          - dev

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-container-apps-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
  REGISTRY_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
  CONTAINER_APP_ENVIRONMENT: ${{ vars.AZURE_CONTAINERAPPS_ENVIRONMENT }}
  STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
  COMMUNICATION_SERVICE_NAME: ${{ vars.AZURE_COMMUNICATION_SERVICE_NAME }}
  AZURE_BLOB_CONTAINER: ${{ vars.AZURE_BLOB_CONTAINER }}
  AZURE_TABLES_TABLE_NAME: ${{ vars.AZURE_TABLES_TABLE_NAME }}
  APP_BASE_URL: ${{ vars.APP_BASE_URL }}
  EMAIL_SENDER_ADDRESS: ${{ vars.AZURE_EMAIL_SENDER_ADDRESS }}
  ADMIN_PERMISSION_TOKEN_EXPIRES_AT: ${{ vars.ADMIN_PERMISSION_TOKEN_EXPIRES_AT }}
  ATS_OPENAI_MODEL: ${{ vars.ATS_OPENAI_MODEL }}
  IMAGE_NAME: cv-collector
  NODE_VERSION: 20

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'prod' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate Azure OIDC inputs
        shell: bash
        run: |
          set -euo pipefail

          is_guid() {
            [[ "$1" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]
          }

          required=(AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID)
          missing=0

          for key in "${required[@]}"; do
            value="${!key:-}"
            if [[ -z "$value" ]]; then
              echo "::error title=Missing Azure variable::${key} is required for Azure OIDC login."
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "::error title=OIDC setup required::Set AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID GitHub variables."
            exit 1
          fi

          for key in "${required[@]}"; do
            value="${!key}"
            if ! is_guid "$value"; then
              echo "::error title=Invalid Azure variable format::${key} must be a GUID value."
              exit 1
            fi
          done

          echo "::notice::Expected federated credential subject: repo:${GITHUB_REPOSITORY}:ref:${GITHUB_REF}"

      - name: Azure login (OIDC)
        id: azure-login
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Fail with Azure OIDC guidance
        if: steps.azure-login.outcome == 'failure'
        shell: bash
        run: |
          echo "::error title=Azure login failed::OIDC login did not succeed."
          echo "::error title=AADSTS700016 common cause::AZURE_CLIENT_ID is not an app registration in tenant AZURE_TENANT_ID, or tenant ID is incorrect."
          echo "::error title=Fix::Create/verify the app registration in the target tenant, add a federated credential with subject repo:${GITHUB_REPOSITORY}:ref:${GITHUB_REF}, then update AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID variables."
          exit 1

      - name: Verify Azure context
        if: steps.azure-login.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail

          actual_tenant="$(az account show --query tenantId -o tsv)"
          actual_subscription="$(az account show --query id -o tsv)"

          if [[ "$actual_tenant" != "$AZURE_TENANT_ID" ]]; then
            echo "::error title=Tenant mismatch::Logged-in tenant ($actual_tenant) does not match AZURE_TENANT_ID."
            exit 1
          fi

          if [[ "$actual_subscription" != "$AZURE_SUBSCRIPTION_ID" ]]; then
            echo "::error title=Subscription mismatch::Logged-in subscription ($actual_subscription) does not match AZURE_SUBSCRIPTION_ID."
            exit 1
          fi

          echo "::notice::Azure tenant and subscription context verified."

      - name: Login to ACR
        run: az acr login --name "$REGISTRY_NAME"

      - name: Build image
        run: docker build -t $REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .

      - name: Push image
        run: docker push $REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: Resolve runtime values
        id: resolve-runtime-values
        uses: azure/CLI@v2
        env:
          REGISTRY_NAME: ${{ env.REGISTRY_NAME }}
          RESOURCE_GROUP: ${{ env.RESOURCE_GROUP }}
          STORAGE_ACCOUNT_NAME: ${{ env.STORAGE_ACCOUNT_NAME }}
          COMMUNICATION_SERVICE_NAME: ${{ env.COMMUNICATION_SERVICE_NAME }}
          AZURE_BLOB_CONTAINER: ${{ env.AZURE_BLOB_CONTAINER }}
          AZURE_TABLES_TABLE_NAME: ${{ env.AZURE_TABLES_TABLE_NAME }}
          APP_BASE_URL: ${{ env.APP_BASE_URL }}
          EMAIL_SENDER_ADDRESS: ${{ env.EMAIL_SENDER_ADDRESS }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          ADMIN_PERMISSION_TOKEN: ${{ secrets.ADMIN_PERMISSION_TOKEN }}
          ADMIN_PERMISSION_TOKEN_EXPIRES_AT: ${{ env.ADMIN_PERMISSION_TOKEN_EXPIRES_AT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ATS_OPENAI_MODEL: ${{ env.ATS_OPENAI_MODEL }}
        with:
          inlineScript: |
            set -euo pipefail

            if [ -z "${AZURE_BLOB_CONTAINER:-}" ]; then
              echo "AZURE_BLOB_CONTAINER GitHub variable is required."
              exit 1
            fi

            if [ -z "${AZURE_TABLES_TABLE_NAME:-}" ]; then
              echo "AZURE_TABLES_TABLE_NAME GitHub variable is required."
              exit 1
            fi

            if [ -z "${APP_BASE_URL:-}" ]; then
              echo "APP_BASE_URL GitHub variable is required."
              exit 1
            fi

            if [ -z "${EMAIL_SENDER_ADDRESS:-}" ]; then
              echo "AZURE_EMAIL_SENDER_ADDRESS GitHub variable is required."
              exit 1
            fi

            if [ -z "${AUTH_SECRET:-}" ]; then
              echo "AUTH_SECRET GitHub secret is required."
              exit 1
            fi

            if [ -z "${ADMIN_PERMISSION_TOKEN:-}" ]; then
              echo "ADMIN_PERMISSION_TOKEN GitHub secret is required."
              exit 1
            fi

            if [ -z "${ADMIN_PERMISSION_TOKEN_EXPIRES_AT:-}" ]; then
              echo "ADMIN_PERMISSION_TOKEN_EXPIRES_AT GitHub variable is required."
              exit 1
            fi

            if [ -z "${OPENAI_API_KEY:-}" ]; then
              echo "OPENAI_API_KEY GitHub secret is required."
              exit 1
            fi

            if [ -z "${ATS_OPENAI_MODEL:-}" ]; then
              echo "ATS_OPENAI_MODEL GitHub variable is required."
              exit 1
            fi

            STORAGE_CONNECTION_STRING=$(az storage account show-connection-string \
              --name "$STORAGE_ACCOUNT_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query connectionString \
              --output tsv)

            COMMUNICATION_CONNECTION_STRING=$(az communication list-key \
              --name "$COMMUNICATION_SERVICE_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query primaryConnectionString \
              --output tsv)

            ACR_USERNAME=$(az acr credential show \
              --name "$REGISTRY_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query username \
              --output tsv)

            ACR_PASSWORD=$(az acr credential show \
              --name "$REGISTRY_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query 'passwords[0].value' \
              --output tsv)

            {
              echo "storage_connection_string=$STORAGE_CONNECTION_STRING"
              echo "communication_connection_string=$COMMUNICATION_CONNECTION_STRING"
              echo "acr_username=$ACR_USERNAME"
              echo "acr_password=$ACR_PASSWORD"
            } >> "$GITHUB_OUTPUT"

      - name: Create or update container app
        uses: azure/CLI@v2
        env:
          REGISTRY_LOGIN_SERVER: ${{ env.REGISTRY_LOGIN_SERVER }}
          RESOURCE_GROUP: ${{ env.RESOURCE_GROUP }}
          CONTAINER_APP_NAME: ${{ env.CONTAINER_APP_NAME }}
          CONTAINER_APP_ENVIRONMENT: ${{ env.CONTAINER_APP_ENVIRONMENT }}
          AZURE_BLOB_CONTAINER: ${{ env.AZURE_BLOB_CONTAINER }}
          AZURE_TABLES_TABLE_NAME: ${{ env.AZURE_TABLES_TABLE_NAME }}
          APP_BASE_URL: ${{ env.APP_BASE_URL }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          EMAIL_SENDER_ADDRESS: ${{ env.EMAIL_SENDER_ADDRESS }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          ADMIN_PERMISSION_TOKEN: ${{ secrets.ADMIN_PERMISSION_TOKEN }}
          ADMIN_PERMISSION_TOKEN_EXPIRES_AT: ${{ env.ADMIN_PERMISSION_TOKEN_EXPIRES_AT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ATS_OPENAI_MODEL: ${{ env.ATS_OPENAI_MODEL }}
        with:
          inlineScript: |
            set -euo pipefail

            IMAGE="$REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"

            if az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --output none 2>/dev/null; then
              az containerapp secret set \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --secrets \
                  auth-secret="$AUTH_SECRET" \
                  admin-permission-token="$ADMIN_PERMISSION_TOKEN" \
                  openai-api-key="$OPENAI_API_KEY" \
                  storage-connection="${{ steps.resolve-runtime-values.outputs.storage_connection_string }}" \
                  communication-connection="${{ steps.resolve-runtime-values.outputs.communication_connection_string }}"

              az containerapp update \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --image "$IMAGE" \
                --set-env-vars \
                  NODE_ENV=production \
                  AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection \
                  AZURE_BLOB_CONTAINER="$AZURE_BLOB_CONTAINER" \
                  AZURE_TABLES_TABLE_NAME="$AZURE_TABLES_TABLE_NAME" \
                  APP_BASE_URL="$APP_BASE_URL" \
                  AZURE_COMMUNICATION_CONNECTION_STRING=secretref:communication-connection \
                  AZURE_EMAIL_SENDER_ADDRESS="$EMAIL_SENDER_ADDRESS" \
                  AUTH_SECRET=secretref:auth-secret \
                  ADMIN_PERMISSION_TOKEN=secretref:admin-permission-token \
                  ADMIN_PERMISSION_TOKEN_EXPIRES_AT="$ADMIN_PERMISSION_TOKEN_EXPIRES_AT" \
                  OPENAI_API_KEY=secretref:openai-api-key \
                  ATS_OPENAI_MODEL="$ATS_OPENAI_MODEL"
            else
              az containerapp create \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --environment "$CONTAINER_APP_ENVIRONMENT" \
                --image "$IMAGE" \
                --target-port 3000 \
                --ingress external \
                --cpu 0.25 \
                --memory 0.5Gi \
                --min-replicas 0 \
                --max-replicas 10 \
                --registry-server "$REGISTRY_LOGIN_SERVER" \
                --registry-username "${{ steps.resolve-runtime-values.outputs.acr_username }}" \
                --registry-password "${{ steps.resolve-runtime-values.outputs.acr_password }}" \
                --secrets \
                  auth-secret="$AUTH_SECRET" \
                  admin-permission-token="$ADMIN_PERMISSION_TOKEN" \
                  openai-api-key="$OPENAI_API_KEY" \
                  storage-connection="${{ steps.resolve-runtime-values.outputs.storage_connection_string }}" \
                  communication-connection="${{ steps.resolve-runtime-values.outputs.communication_connection_string }}" \
                --env-vars \
                  NODE_ENV=production \
                  AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection \
                  AZURE_BLOB_CONTAINER="$AZURE_BLOB_CONTAINER" \
                  AZURE_TABLES_TABLE_NAME="$AZURE_TABLES_TABLE_NAME" \
                  APP_BASE_URL="$APP_BASE_URL" \
                  AZURE_COMMUNICATION_CONNECTION_STRING=secretref:communication-connection \
                  AZURE_EMAIL_SENDER_ADDRESS="$EMAIL_SENDER_ADDRESS" \
                  AUTH_SECRET=secretref:auth-secret \
                  ADMIN_PERMISSION_TOKEN=secretref:admin-permission-token \
                  ADMIN_PERMISSION_TOKEN_EXPIRES_AT="$ADMIN_PERMISSION_TOKEN_EXPIRES_AT" \
                  OPENAI_API_KEY=secretref:openai-api-key \
                  ATS_OPENAI_MODEL="$ATS_OPENAI_MODEL"
            fi
