name: CI and Azure Container Apps

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-container-apps-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}
  REGISTRY_LOGIN_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
  CONTAINER_APP_ENVIRONMENT: ${{ secrets.AZURE_CONTAINERAPPS_ENVIRONMENT }}
  STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
  COMMUNICATION_SERVICE_NAME: ${{ secrets.AZURE_COMMUNICATION_SERVICE_NAME }}
  EMAIL_SENDER_ADDRESS: ${{ secrets.AZURE_EMAIL_SENDER_ADDRESS }}
  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
  IMAGE_NAME: cv-collector
  NODE_VERSION: 20

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "$REGISTRY_NAME"

      - name: Build image
        run: docker build -t $REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .

      - name: Push image
        run: docker push $REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: Resolve runtime values
        id: resolve-runtime-values
        uses: azure/CLI@v2
        env:
          REGISTRY_NAME: ${{ env.REGISTRY_NAME }}
          RESOURCE_GROUP: ${{ env.RESOURCE_GROUP }}
          STORAGE_ACCOUNT_NAME: ${{ env.STORAGE_ACCOUNT_NAME }}
          COMMUNICATION_SERVICE_NAME: ${{ env.COMMUNICATION_SERVICE_NAME }}
          EMAIL_SENDER_ADDRESS: ${{ secrets.AZURE_EMAIL_SENDER_ADDRESS }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        with:
          inlineScript: |
            set -euo pipefail

            if [ -z "${EMAIL_SENDER_ADDRESS:-}" ]; then
              echo "AZURE_EMAIL_SENDER_ADDRESS GitHub secret is required."
              exit 1
            fi

            if [ -z "${AUTH_SECRET:-}" ]; then
              echo "AUTH_SECRET GitHub secret is required."
              exit 1
            fi

            STORAGE_CONNECTION_STRING=$(az storage account show-connection-string \
              --name "$STORAGE_ACCOUNT_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query connectionString \
              --output tsv)

            COMMUNICATION_CONNECTION_STRING=$(az communication list-key \
              --name "$COMMUNICATION_SERVICE_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query primaryConnectionString \
              --output tsv)

            ACR_USERNAME=$(az acr credential show \
              --name "$REGISTRY_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query username \
              --output tsv)

            ACR_PASSWORD=$(az acr credential show \
              --name "$REGISTRY_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query 'passwords[0].value' \
              --output tsv)

            {
              echo "storage_connection_string=$STORAGE_CONNECTION_STRING"
              echo "communication_connection_string=$COMMUNICATION_CONNECTION_STRING"
              echo "acr_username=$ACR_USERNAME"
              echo "acr_password=$ACR_PASSWORD"
            } >> "$GITHUB_OUTPUT"

      - name: Create or update container app
        uses: azure/CLI@v2
        env:
          REGISTRY_LOGIN_SERVER: ${{ env.REGISTRY_LOGIN_SERVER }}
          RESOURCE_GROUP: ${{ env.RESOURCE_GROUP }}
          CONTAINER_APP_NAME: ${{ env.CONTAINER_APP_NAME }}
          CONTAINER_APP_ENVIRONMENT: ${{ env.CONTAINER_APP_ENVIRONMENT }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          EMAIL_SENDER_ADDRESS: ${{ secrets.AZURE_EMAIL_SENDER_ADDRESS }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        with:
          inlineScript: |
            set -euo pipefail

            IMAGE="$REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"

            if az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --output none 2>/dev/null; then
              az containerapp secret set \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --secrets \
                  auth-secret="$AUTH_SECRET" \
                  storage-connection="${{ steps.resolve-runtime-values.outputs.storage_connection_string }}" \
                  communication-connection="${{ steps.resolve-runtime-values.outputs.communication_connection_string }}"

              az containerapp update \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --image "$IMAGE" \
                --set-env-vars \
                  NODE_ENV=production \
                  AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection \
                  AZURE_BLOB_CONTAINER=cv-files \
                  AZURE_TABLES_TABLE_NAME=cvcollector \
                  AZURE_COMMUNICATION_CONNECTION_STRING=secretref:communication-connection \
                  AZURE_EMAIL_SENDER_ADDRESS="$EMAIL_SENDER_ADDRESS" \
                  AUTH_SECRET=secretref:auth-secret
            else
              az containerapp create \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --environment "$CONTAINER_APP_ENVIRONMENT" \
                --image "$IMAGE" \
                --target-port 3000 \
                --ingress external \
                --cpu 0.25 \
                --memory 0.5Gi \
                --min-replicas 0 \
                --max-replicas 1 \
                --registry-server "$REGISTRY_LOGIN_SERVER" \
                --registry-username "${{ steps.resolve-runtime-values.outputs.acr_username }}" \
                --registry-password "${{ steps.resolve-runtime-values.outputs.acr_password }}" \
                --secrets \
                  auth-secret="$AUTH_SECRET" \
                  storage-connection="${{ steps.resolve-runtime-values.outputs.storage_connection_string }}" \
                  communication-connection="${{ steps.resolve-runtime-values.outputs.communication_connection_string }}" \
                --env-vars \
                  NODE_ENV=production \
                  AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection \
                  AZURE_BLOB_CONTAINER=cv-files \
                  AZURE_TABLES_TABLE_NAME=cvcollector \
                  AZURE_COMMUNICATION_CONNECTION_STRING=secretref:communication-connection \
                  AZURE_EMAIL_SENDER_ADDRESS="$EMAIL_SENDER_ADDRESS" \
                  AUTH_SECRET=secretref:auth-secret
            fi
