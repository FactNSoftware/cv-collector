name: CI and Azure Container Apps MT Dev

on:
  pull_request:
    branches: [multitenancy]
  push:
    branches: [multitenancy]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-container-apps-mt-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
  REGISTRY_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
  CONTAINER_APP_ENVIRONMENT: ${{ vars.AZURE_CONTAINERAPPS_ENVIRONMENT }}
  STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
  COMMUNICATION_SERVICE_NAME: ${{ vars.AZURE_COMMUNICATION_SERVICE_NAME }}
  SERVICE_BUS_NAMESPACE_NAME: ${{ vars.AZURE_SERVICE_BUS_NAMESPACE_NAME }}
  SERVICE_BUS_OTP_QUEUE_NAME: ${{ vars.AZURE_SERVICE_BUS_OTP_QUEUE_NAME }}
  EMAIL_SENDER_ADDRESS: ${{ vars.AZURE_EMAIL_SENDER_ADDRESS }}
  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
  ADMIN_PERMISSION_TOKEN: ${{ secrets.ADMIN_PERMISSION_TOKEN }}
  ADMIN_PERMISSION_TOKEN_EXPIRES_AT: ${{ vars.ADMIN_PERMISSION_TOKEN_EXPIRES_AT }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ATS_OPENAI_MODEL: ${{ vars.ATS_OPENAI_MODEL }}
  IMAGE_NAME: cv-collector-mt-dev
  MANAGED_IDENTITY_NAME: id-registry-pull
  NODE_VERSION: 20

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/multitenancy'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate workflow secrets
        run: |
          set -euo pipefail

          required_vars=(
            REGISTRY_NAME
            REGISTRY_LOGIN_SERVER
            RESOURCE_GROUP
            CONTAINER_APP_NAME
            CONTAINER_APP_ENVIRONMENT
            STORAGE_ACCOUNT_NAME
            COMMUNICATION_SERVICE_NAME
            SERVICE_BUS_NAMESPACE_NAME
            SERVICE_BUS_OTP_QUEUE_NAME
            EMAIL_SENDER_ADDRESS
            AUTH_SECRET
            ADMIN_PERMISSION_TOKEN
            ADMIN_PERMISSION_TOKEN_EXPIRES_AT
            OPENAI_API_KEY
            ATS_OPENAI_MODEL
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "$var_name is required."
              exit 1
            fi
          done

      - name: Login to ACR
        run: az acr login --name "$REGISTRY_NAME"

      - name: Build image
        run: docker build -t $REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .

      - name: Push image
        run: docker push $REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: Resolve runtime values
        id: resolve-runtime-values
        uses: azure/CLI@v2
        env:
          REGISTRY_NAME: ${{ env.REGISTRY_NAME }}
          RESOURCE_GROUP: ${{ env.RESOURCE_GROUP }}
          STORAGE_ACCOUNT_NAME: ${{ env.STORAGE_ACCOUNT_NAME }}
          COMMUNICATION_SERVICE_NAME: ${{ env.COMMUNICATION_SERVICE_NAME }}
          SERVICE_BUS_NAMESPACE_NAME: ${{ env.SERVICE_BUS_NAMESPACE_NAME }}
          MANAGED_IDENTITY_NAME: ${{ env.MANAGED_IDENTITY_NAME }}
        with:
          inlineScript: |
            set -euo pipefail

            STORAGE_CONNECTION_STRING=$(az storage account show-connection-string \
              --name "$STORAGE_ACCOUNT_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query connectionString \
              --output tsv)

            COMMUNICATION_CONNECTION_STRING=$(az communication list-key \
              --name "$COMMUNICATION_SERVICE_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query primaryConnectionString \
              --output tsv)

            SERVICE_BUS_CONNECTION_STRING=$(az servicebus namespace authorization-rule keys list \
              --resource-group "$RESOURCE_GROUP" \
              --namespace-name "$SERVICE_BUS_NAMESPACE_NAME" \
              --name RootManageSharedAccessKey \
              --query primaryConnectionString \
              --output tsv)

            MANAGED_IDENTITY_ID=$(az identity show \
              --name "$MANAGED_IDENTITY_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query id \
              --output tsv)

            {
              echo "storage_connection_string=$STORAGE_CONNECTION_STRING"
              echo "communication_connection_string=$COMMUNICATION_CONNECTION_STRING"
              echo "service_bus_connection_string=$SERVICE_BUS_CONNECTION_STRING"
              echo "managed_identity_id=$MANAGED_IDENTITY_ID"
            } >> "$GITHUB_OUTPUT"

      - name: Create or update container app
        uses: azure/CLI@v2
        env:
          REGISTRY_LOGIN_SERVER: ${{ env.REGISTRY_LOGIN_SERVER }}
          RESOURCE_GROUP: ${{ env.RESOURCE_GROUP }}
          CONTAINER_APP_NAME: ${{ env.CONTAINER_APP_NAME }}
          CONTAINER_APP_ENVIRONMENT: ${{ env.CONTAINER_APP_ENVIRONMENT }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          EMAIL_SENDER_ADDRESS: ${{ env.EMAIL_SENDER_ADDRESS }}
          AUTH_SECRET: ${{ env.AUTH_SECRET }}
          ADMIN_PERMISSION_TOKEN: ${{ env.ADMIN_PERMISSION_TOKEN }}
          ADMIN_PERMISSION_TOKEN_EXPIRES_AT: ${{ env.ADMIN_PERMISSION_TOKEN_EXPIRES_AT }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          ATS_OPENAI_MODEL: ${{ env.ATS_OPENAI_MODEL }}
          MANAGED_IDENTITY_ID: ${{ steps.resolve-runtime-values.outputs.managed_identity_id }}
        with:
          inlineScript: |
            set -euo pipefail

            IMAGE="$REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"

            if az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --output none 2>/dev/null; then
              az containerapp identity assign \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --user-assigned "$MANAGED_IDENTITY_ID" \
                --output none

              az containerapp registry set \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --server "$REGISTRY_LOGIN_SERVER" \
                --identity "$MANAGED_IDENTITY_ID" \
                --output none

              az containerapp secret set \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --secrets \
                  auth-secret="$AUTH_SECRET" \
                  admin-permission-token="$ADMIN_PERMISSION_TOKEN" \
                  openai-api-key="$OPENAI_API_KEY" \
                  storage-connection="${{ steps.resolve-runtime-values.outputs.storage_connection_string }}" \
                  communication-connection="${{ steps.resolve-runtime-values.outputs.communication_connection_string }}" \
                  service-bus-connection="${{ steps.resolve-runtime-values.outputs.service_bus_connection_string }}"

              az containerapp update \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --image "$IMAGE" \
                --set-env-vars \
                  NODE_ENV=production \
                  AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection \
                  AZURE_BLOB_CONTAINER=cv-files \
                  AZURE_TABLES_TABLE_NAME=cvcollector \
                  AZURE_COMMUNICATION_CONNECTION_STRING=secretref:communication-connection \
                  AZURE_SERVICE_BUS_CONNECTION_STRING=secretref:service-bus-connection \
                  AZURE_SERVICE_BUS_OTP_QUEUE_NAME="$SERVICE_BUS_OTP_QUEUE_NAME" \
                  AZURE_EMAIL_SENDER_ADDRESS="$EMAIL_SENDER_ADDRESS" \
                  AUTH_SECRET=secretref:auth-secret \
                  ADMIN_PERMISSION_TOKEN=secretref:admin-permission-token \
                  ADMIN_PERMISSION_TOKEN_EXPIRES_AT="$ADMIN_PERMISSION_TOKEN_EXPIRES_AT" \
                  OPENAI_API_KEY=secretref:openai-api-key \
                  ATS_OPENAI_MODEL="$ATS_OPENAI_MODEL"
            else
              az containerapp create \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --environment "$CONTAINER_APP_ENVIRONMENT" \
                --image "$IMAGE" \
                --target-port 3000 \
                --ingress external \
                --cpu 0.25 \
                --memory 0.5Gi \
                --min-replicas 0 \
                --max-replicas 10 \
                --user-assigned "$MANAGED_IDENTITY_ID" \
                --registry-server "$REGISTRY_LOGIN_SERVER" \
                --registry-identity "$MANAGED_IDENTITY_ID" \
                --secrets \
                  auth-secret="$AUTH_SECRET" \
                  admin-permission-token="$ADMIN_PERMISSION_TOKEN" \
                  openai-api-key="$OPENAI_API_KEY" \
                  storage-connection="${{ steps.resolve-runtime-values.outputs.storage_connection_string }}" \
                  communication-connection="${{ steps.resolve-runtime-values.outputs.communication_connection_string }}" \
                  service-bus-connection="${{ steps.resolve-runtime-values.outputs.service_bus_connection_string }}" \
                --env-vars \
                  NODE_ENV=production \
                  AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection \
                  AZURE_BLOB_CONTAINER=cv-files \
                  AZURE_TABLES_TABLE_NAME=cvcollector \
                  AZURE_COMMUNICATION_CONNECTION_STRING=secretref:communication-connection \
                  AZURE_SERVICE_BUS_CONNECTION_STRING=secretref:service-bus-connection \
                  AZURE_SERVICE_BUS_OTP_QUEUE_NAME="$SERVICE_BUS_OTP_QUEUE_NAME" \
                  AZURE_EMAIL_SENDER_ADDRESS="$EMAIL_SENDER_ADDRESS" \
                  AUTH_SECRET=secretref:auth-secret \
                  ADMIN_PERMISSION_TOKEN=secretref:admin-permission-token \
                  ADMIN_PERMISSION_TOKEN_EXPIRES_AT="$ADMIN_PERMISSION_TOKEN_EXPIRES_AT" \
                  OPENAI_API_KEY=secretref:openai-api-key \
                  ATS_OPENAI_MODEL="$ATS_OPENAI_MODEL"
